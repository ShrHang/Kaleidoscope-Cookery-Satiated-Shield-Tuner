modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}" #optional
description = '''${mod_description}'''

[[dependencies."${mod_id}"]] #optional
modId = "forge"
mandatory = true
versionRange = "${forge_version_range}"
ordering = "NONE"
side = "BOTH"# Here's another dependency

[[dependencies."${mod_id}"]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "kaleidoscope_cookery"
type = "required"
versionRange = "[1.2.0-forge+mc1.21.1,)"
ordering = "NONE"
side = "SERVER"

[[dependencies."${mod_id}"]]
modId = "kaleidoscope_compat"
type = "optional"
versionRange = "[2.4.0-forge+mc1.21.1,)"
ordering = "NONE"
side = "SERVER"
